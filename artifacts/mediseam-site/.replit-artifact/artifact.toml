kind = "web"
previewPath = "/"
title = "MediSeam"
version = "1.0.0"
id = "artifacts/mediseam-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19052

[services.development]
run = "pnpm --filter @workspace/mediseam-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mediseam-site", "run", "build" ]
publicDir = "artifacts/mediseam-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19052"
BASE_PATH = "/"
